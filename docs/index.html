<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiSynt Evaluation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
    <header>
        <h1>MultiSynt Evaluation Dashboard</h1>
    </header>

    <main>
        <nav class="tab-nav" id="tab-nav">
            <!-- Tabs dynamically populated from data -->
        </nav>

        <div class="controls">
            <div class="control-group">
                <label for="task-select">Task:</label>
                <select id="task-select">
                    <option value="__filtered__" title="Micro-average over tasks passing HPLT-E signal-quality criteria (monotonicity, SNR, CV, prompt sensitivity). Excludes noisy or unreliable benchmarks.">Signal-filtered tasks</option>
                    <option value="__all_macro__" title="Scores are first averaged within each task category, then averaged across categories. This gives equal weight to each category regardless of how many tasks it contains.">All (category-average)</option>
                    <option value="__all__" title="Simple average across all tasks. Each task contributes equally regardless of category.">All (task-average)</option>
                    <option value="__custom__" hidden>Custom (task-average)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Shots:</label>
                <div class="shot-toggle">
                    <button class="shot-btn active" data-shot="0">0-shot</button>
                    <button class="shot-btn" data-shot="1">1-shot</button>
                    <button class="shot-btn" data-shot="5">5-shot</button>
                </div>
            </div>

            <div class="control-group">
                <label for="prompt-agg-select">Prompt aggregation:</label>
                <select id="prompt-agg-select" class="control-select">
                    <option value="max" selected>max</option>
                    <option value="mean">mean</option>
                    <option value="median">median</option>
                    <option value="min">min</option>
                    <option value="stdev">stdev</option>
                </select>
            </div>

            <div class="control-group">
                <label for="norm-select">Normalization:</label>
                <select id="norm-select" class="control-select">
                    <option value="none">none</option>
                    <option value="baseline" selected>random baseline</option>
                </select>
            </div>

            <div class="control-group" id="metric-control" style="display:none;">
                <label for="metric-select">Metric:</label>
                <select id="metric-select" class="control-select"></select>
            </div>

            <div class="control-group">
                <label class="toggle-label">
                    <input type="checkbox" id="prompt-dev-toggle" checked>
                    <span id="prompt-dev-label">Prompt uncertainty</span>
                </label>
            </div>
        </div>

        <div id="task-description" class="task-description" style="display:none;"></div>

        <div id="filter-panel" class="filter-panel" style="display:none;">
            <div class="filter-panel-header">
                <button id="filter-panel-toggle" class="small-btn">Show signal criteria</button>
                <button id="filter-download-btn" class="small-btn" title="Download criteria settings as JSON">↓ Download</button>
                <button id="filter-upload-btn" class="small-btn" title="Upload criteria settings from JSON">↑ Upload</button>
                <input type="file" id="filter-upload-input" accept=".json" style="display:none;">
                <span id="filter-summary" class="filter-summary"></span>
            </div>
            <div id="filter-panel-content" style="display:none;">
                <h3>Task-signal criteria</h3>
                <p class="filter-description">Based on <a href="https://github.com/hplt-project/hplt-e">HPLT-E</a> task selection. Only benchmarks passing all enabled criteria are aggregated.</p>
                <div id="filter-criteria-grid" class="filter-criteria-grid"></div>
                <div id="filter-table-content" class="filter-table-content">
                    <table id="filter-table" class="filter-table"></table>
                </div>
            </div>
        </div>

        <div id="chart-container">
            <div id="chart"></div>
        </div>

        <div id="task-checkboxes" class="task-checkboxes">
            <div class="checkbox-header">
                <h3>Tasks included in aggregation</h3>
                <div class="checkbox-actions">
                    <button id="select-all-btn" class="small-btn">Select all</button>
                    <button id="select-none-btn" class="small-btn">Select none</button>
                </div>
            </div>
            <div id="checkbox-grid" class="checkbox-grid"></div>
        </div>

    </main>

    <div id="custom-tooltip" class="custom-tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-meta" id="tooltip-meta"></div>
        <div class="tooltip-body" id="tooltip-body"></div>
        <div class="tooltip-footer" id="tooltip-footer"></div>
    </div>

    <footer>
        <p>Made by <a href="https://www.mn.uio.no/ifi/english/research/groups/ltg/">Language Technology Group</a>, University of Oslo</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
